/* ============ NOTIFICATION CENTER ============ */
function NotificationCenter({data,currentUser,role,update,markNotifRead}){
  const canSendAny = role==='owner' || role==='producer' || role==='depthead';
  const canSendUrgent = can(currentUser,'send_urgent_alert',{deptHeadsCanUrgent:data.meta.deptHeadsCanUrgent});
  const canSendRoleGroups = can(currentUser,'send_notification_role_group');

  const [text,setText] = useState("");
  const [targetType,setTargetType] = useState(role==='depthead' ? 'department' : 'all');
  const [targetDept,setTargetDept] = useState(role==='depthead' ? currentUser.department : Object.keys(DEPARTMENT_TREE)[0]);
  const [targetRole,setTargetRole] = useState('producers');
  const [targetUser,setTargetUser] = useState("");
  const [urgent,setUrgent] = useState(false);
  const [expandedId,setExpandedId] = useState(null);

  const myNotifs = data.notifications.filter(n=>notifTargets(n,currentUser,data)).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // available target types per role
  const targetTypeOptions = [];
  if(role==='owner' || role==='producer'){
    targetTypeOptions.push({value:'all',label:'Everyone'});
    targetTypeOptions.push({value:'department',label:'Specific Department'});
    if(role==='owner') targetTypeOptions.push({value:'role',label:'Role Group'});
    if(role==='producer'){
      targetTypeOptions.push({value:'cast',label:'Cast'});
      targetTypeOptions.push({value:'crew',label:'Crew'});
    }
    targetTypeOptions.push({value:'user',label:'Individual User'});
  }else if(role==='depthead'){
    targetTypeOptions.push({value:'department',label:'My Department'});
    targetTypeOptions.push({value:'user',label:'Person in My Department'});
  }

  // user options for individual-target picker, scoped by role
  const userOptions = role==='depthead'
    ? data.users.filter(u=>u.department===currentUser.department && u.id!==currentUser.id)
    : data.users.filter(u=>u.id!==currentUser.id);

  function send(){
    if(!canSendAny) return; // backend-style block
    if(!text.trim()) return;

    let target = {type:'all',value:null};
    if(targetType==='department') target = {type:'department',value: role==='depthead' ? currentUser.department : targetDept};
    if(targetType==='cast') target = {type:'department',value:'Cast'};
    if(targetType==='crew') target = {type:'role',value:'crew'};
    if(targetType==='role') target = {type:'role',value:targetRole};
    if(targetType==='user') target = {type:'user',value:targetUser};

    // Permission re-check on the actual computed target (defense in depth)
    let allowed = false;
    if(target.type==='all') allowed = can(currentUser,'send_notification_all');
    else if(target.type==='department') allowed = can(currentUser,'send_notification_to_department',{department:target.value});
    else if(target.type==='role') allowed = can(currentUser,'send_notification_role_group');
    else if(target.type==='user'){
      const targetUserObj = data.users.find(u=>u.id===target.value);
      allowed = can(currentUser,'send_notification_to_user',{targetUserDepartment: targetUserObj ? targetUserObj.department : null});
    }
    if(!allowed) return; // backend-style block

    const isUrgent = urgent && can(currentUser,'send_urgent_alert',{deptHeadsCanUrgent:data.meta.deptHeadsCanUrgent});

    update(d=>{
      d.notifications.unshift({
        id:uid(),text,author:`${currentUser.firstName} ${currentUser.lastName}`,authorId:currentUser.id,
        date:new Date().toLocaleString(),urgent:isUrgent,target,reads:{}
      });
    });
    setText("");
    setUrgent(false);
  }

  // mark visible notifs as read when viewed
  useEffect(()=>{
    myNotifs.forEach(n=>{
      if(!(n.reads && n.reads[currentUser.id])) markNotifRead(n.id);
    });
  },[]);

  function targetDisplay(n){
    if(n.target.type==='all') return 'To: Everyone';
    if(n.target.type==='department') return 'To: '+n.target.value;
    if(n.target.type==='role') return 'To: '+roleLabel(n.target.value==='crew'?'crew':n.target.value==='producers'?'producer':n.target.value==='depthead'?'depthead':n.target.value)+' (group)';
    return 'Direct Message';
  }

  return (
    <div>
      <div className="section-title">Message Center</div>

      {canSendAny && (
        <div className="card">
          <div className="dash-tile-title">Send a Message</div>
          <div className="form-group">
            <label className="form-label">Send To</label>
            <div className="target-select-grid">
              {targetTypeOptions.map(t=>(
                <button key={t.value} className={"tab-btn"+(targetType===t.value?' active':'')} onClick={()=>setTargetType(t.value)}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
          {targetType==='department' && role!=='depthead' && (
            <div className="form-group">
              <label className="form-label">Department</label>
              <select className="form-select" value={targetDept} onChange={e=>setTargetDept(e.target.value)}>
                {Object.keys(DEPARTMENT_TREE).map(dep=><option key={dep} value={dep}>{dep}</option>)}
              </select>
            </div>
          )}
          {targetType==='department' && role==='depthead' && (
            <div style={{fontSize:'12px',color:'var(--gray)',marginBottom:'10px'}}>
              This message will go to everyone in {currentUser.department}.
            </div>
          )}
          {targetType==='role' && (
            <div className="form-group">
              <label className="form-label">Role Group</label>
              <select className="form-select" value={targetRole} onChange={e=>setTargetRole(e.target.value)}>
                <option value="producers">Producers</option>
                <option value="depthead">Department Heads</option>
                <option value="cast">Cast</option>
                <option value="crew">Crew</option>
              </select>
            </div>
          )}
          {targetType==='user' && (
            <div className="form-group">
              <label className="form-label">{role==='depthead' ? 'Person in My Department' : 'User'}</label>
              <select className="form-select" value={targetUser} onChange={e=>setTargetUser(e.target.value)}>
                <option value="">Select person...</option>
                {userOptions.map(u=><option key={u.id} value={u.id}>{u.firstName} {u.lastName} — {u.department}</option>)}
              </select>
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Message</label>
            <textarea className="form-textarea" placeholder="e.g. Call time moved to 8:00 AM for everyone." value={text} onChange={e=>setText(e.target.value)}/>
          </div>
          {canSendUrgent ? (
            <div className="check-item" onClick={()=>setUrgent(!urgent)}>
              <div className={"check-box"+(urgent?' checked':'')}>{urgent?'✓':''}</div>
              <div className="check-label">Mark as Urgent Alert (pop-up on login)</div>
            </div>
          ) : (
            role==='depthead' && (
              <div style={{fontSize:'11px',color:'var(--gray-dim)',marginBottom:'8px',fontFamily:'var(--mono)',letterSpacing:'1px'}}>
                URGENT ALERTS REQUIRE OWNER PERMISSION
              </div>
            )
          )}
          <div className="btn-row">
            <button className="btn" onClick={send}>Send Message</button>
          </div>
        </div>
      )}

      {!canSendAny && (
        <div className="empty-state">You can view messages sent to you here. Only production leadership can send new messages.</div>
      )}

      {myNotifs.length===0 && <div className="empty-state">No messages yet.</div>}
      {myNotifs.map(n=>{
        const canSeeReadStatus = n.authorId===currentUser.id && (role==='owner'||role==='producer'||role==='depthead');
        const totalRecipients = n.target.type==='all' ? data.users.length
          : n.target.type==='department' ? data.users.filter(u=>u.department===n.target.value).length
          : n.target.type==='role' ? data.users.filter(u=>notifTargets(n,u,data)).length
          : 1;
        const readCount = Object.keys(n.reads||{}).length;
        const recipients = n.target.type==='all' ? data.users
          : n.target.type==='department' ? data.users.filter(u=>u.department===n.target.value)
          : n.target.type==='role' ? data.users.filter(u=>notifTargets(n,u,data))
          : data.users.filter(u=>u.id===n.target.value);
        return (
          <div key={n.id} className={"notif-card"+(n.urgent?' urgent':'')}>
            <div className="notif-target">
              {n.urgent && '⚠ URGENT · '}
              {targetDisplay(n)}
            </div>
            <div className="msg-head"><span className="msg-author">{n.author}</span><span className="msg-meta">{n.date}</span></div>
            <div className="msg-body">{n.text}</div>
            {canSeeReadStatus && (
              <>
                <div className="read-status" onClick={()=>setExpandedId(expandedId===n.id?null:n.id)} style={{cursor:'pointer'}}>
                  Viewed by {readCount} of {totalRecipients} {expandedId===n.id?'▲':'▼'}
                </div>
                {expandedId===n.id && (
                  <div className="read-list">
                    {recipients.length===0 && <div>No recipients on file.</div>}
                    {recipients.map(u=>(
                      <div key={u.id} className="read-list-row">
                        <span>{u.firstName} {u.lastName} ({u.department})</span>
                        <span className={n.reads && n.reads[u.id] ? 'read-yes':'read-no'}>
                          {n.reads && n.reads[u.id] ? '✓ Viewed '+new Date(n.reads[u.id]).toLocaleString() : 'Not viewed'}
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ============ CAST DASHBOARD ============ */
function CastDashboard({data,currentUser,update,role}){
  const canEdit = role==='owner' || role==='producer';
  const [showAddScene,setShowAddScene] = useState(false);
  const blankScene = {sceneNumbers:'',shootDate:'',callTime:'',status:'upcoming'};
  const [sceneForm,setSceneForm] = useState(blankScene);

  const blankVersion = {version:'',revisionDate:'',uploadedBy:'',note:'',fileData:'',fileName:''};
  const [versionForm,setVersionForm] = useState(blankVersion);
  const [showAddVersion,setShowAddVersion] = useState(false);

  const blankNote = {title:'',type:'Character Bio',content:'',fileData:'',fileName:''};
  const [noteForm,setNoteForm] = useState(blankNote);
  const [showAddNote,setShowAddNote] = useState(false);

  function addScene(){
    if(!sceneForm.sceneNumbers.trim()) return;
    update(d=>{d.myScenes.push({...sceneForm,id:uid()});});
    setSceneForm(blankScene);
    setShowAddScene(false);
  }
  function delScene(id){
    update(d=>{d.myScenes=d.myScenes.filter(s=>s.id!==id);});
  }

  function handleVersionFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      setVersionForm({...versionForm,fileData:reader.result,fileName:file.name});
    };
    reader.readAsDataURL(file);
  }
  function addVersion(){
    if(!versionForm.version.trim()) return;
    update(d=>{d.scriptVersions.unshift({...versionForm,id:uid()});});
    setVersionForm(blankVersion);
    setShowAddVersion(false);
  }
  function delVersion(id){
    update(d=>{d.scriptVersions=d.scriptVersions.filter(v=>v.id!==id);});
  }

  function handleNoteFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      setNoteForm({...noteForm,fileData:reader.result,fileName:file.name});
    };
    reader.readAsDataURL(file);
  }
  function addNote(){
    if(!noteForm.title.trim()) return;
    update(d=>{d.characterNotes.unshift({...noteForm,id:uid()});});
    setNoteForm(blankNote);
    setShowAddNote(false);
  }
  function delNote(id){
    update(d=>{d.characterNotes=d.characterNotes.filter(n=>n.id!==id);});
  }

  const castAnnouncements = data.announcements.filter(a=>true); // shared feed for now

  return (
    <div>
      <div className="section-title">Cast Dashboard</div>

      {/* My Scenes */}
      <div className="dash-tile">
        <div className="dash-tile-title">My Scenes</div>
        {data.myScenes.length===0 && <div className="empty-state">No scenes scheduled yet.</div>}
        {data.myScenes.map(s=>(
          <div key={s.id} className="card-row" style={{flexDirection:'column',alignItems:'flex-start',gap:'4px'}}>
            <div style={{display:'flex',justifyContent:'space-between',width:'100%'}}>
              <span className="value">Scene(s) {s.sceneNumbers}</span>
              <span className={"status-tag status-"+(s.status==='shooting'?'shooting':s.status==='completed'?'completed':'upcoming')}>{s.status}</span>
            </div>
            <span className="label">{fmtDate(s.shootDate)} · Call: {s.callTime||'—'}</span>
            {canEdit && <button className="btn-danger btn-sm" style={{marginTop:'4px'}} onClick={()=>delScene(s.id)}>Remove</button>}
          </div>
        ))}
        {canEdit && !showAddScene && <div className="btn-row"><button className="btn-secondary btn-sm" onClick={()=>setShowAddScene(true)}>+ Add Scene</button></div>}
        {canEdit && showAddScene && (
          <div style={{marginTop:'10px'}}>
            <div className="form-group"><label className="form-label">Scene Number(s)</label><input className="form-input" value={sceneForm.sceneNumbers} onChange={e=>setSceneForm({...sceneForm,sceneNumbers:e.target.value})}/></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Shoot Date</label><input className="form-input" type="date" value={sceneForm.shootDate} onChange={e=>setSceneForm({...sceneForm,shootDate:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Call Time</label><input className="form-input" value={sceneForm.callTime} onChange={e=>setSceneForm({...sceneForm,callTime:e.target.value})}/></div>
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-select" value={sceneForm.status} onChange={e=>setSceneForm({...sceneForm,status:e.target.value})}>
                <option value="upcoming">Upcoming</option>
                <option value="shooting">Shooting Today</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div className="btn-row"><button className="btn btn-sm" onClick={addScene}>Add</button><button className="btn-secondary btn-sm" onClick={()=>setShowAddScene(false)}>Cancel</button></div>
          </div>
        )}
      </div>

      {/* Script Updates */}
      <div className="dash-tile">
        <div className="dash-tile-title">Script Updates</div>
        {data.scriptVersions.length===0 && <div className="empty-state">No script versions uploaded yet.</div>}
        {data.scriptVersions.map(v=>(
          <div key={v.id} className="version-row">
            <div>
              <div className="version-tag">Script Revision {v.version}</div>
              <div className="version-meta">Uploaded {fmtDate(v.revisionDate)} · By {v.uploadedBy||'Production'}{v.note?' · '+v.note:''}</div>
            </div>
            <div style={{display:'flex',gap:'6px'}}>
              {v.fileData && <a className="btn-secondary btn-sm" href={v.fileData} download={v.fileName} style={{textDecoration:'none'}}>View</a>}
              {canEdit && <button className="btn-danger btn-sm" onClick={()=>delVersion(v.id)}>Delete</button>}
            </div>
          </div>
        ))}
        {canEdit && !showAddVersion && <div className="btn-row"><button className="btn-secondary btn-sm" onClick={()=>setShowAddVersion(true)}>+ Upload Script / Revision</button></div>}
        {canEdit && showAddVersion && (
          <div style={{marginTop:'10px'}}>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Version Number</label><input className="form-input" placeholder="e.g. 3.2" value={versionForm.version} onChange={e=>setVersionForm({...versionForm,version:e.target.value})}/></div>
              <div className="form-group"><label className="form-label">Revision Date</label><input className="form-input" type="date" value={versionForm.revisionDate} onChange={e=>setVersionForm({...versionForm,revisionDate:e.target.value})}/></div>
            </div>
            <div className="form-group"><label className="form-label">Uploaded By</label><input className="form-input" value={versionForm.uploadedBy} onChange={e=>setVersionForm({...versionForm,uploadedBy:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Note (e.g. Updated Pages 12–17)</label><input className="form-input" value={versionForm.note} onChange={e=>setVersionForm({...versionForm,note:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">File (Full Script, Sides, Colored Pages)</label><input type="file" className="form-input" onChange={handleVersionFile}/></div>
            <div className="btn-row"><button className="btn btn-sm" onClick={addVersion}>Upload</button><button className="btn-secondary btn-sm" onClick={()=>setShowAddVersion(false)}>Cancel</button></div>
          </div>
        )}
      </div>

      {/* Cast Announcements */}
      <div className="dash-tile">
        <div className="dash-tile-title">Cast Announcements</div>
        {castAnnouncements.length===0 && <div className="empty-state">No announcements yet.</div>}
        {castAnnouncements.slice(0,5).map(a=>(
          <div key={a.id} className="msg-card" style={{marginBottom:'8px'}}>
            <div className="msg-head"><span className="msg-author">{a.author}</span><span className="msg-meta">{a.date}</span></div>
            <div className="msg-body">{a.text}</div>
          </div>
        ))}
      </div>

      {/* Character Notes */}
      <div className="dash-tile">
        <div className="dash-tile-title">Character Notes</div>
        {data.characterNotes.length===0 && <div className="empty-state">No character notes uploaded yet.</div>}
        {data.characterNotes.map(n=>(
          <div key={n.id} className="version-row">
            <div>
              <div className="version-tag">{n.title}</div>
              <div className="version-meta">{n.type}</div>
              {n.content && <div style={{fontSize:'13px',marginTop:'4px',whiteSpace:'pre-wrap'}}>{n.content}</div>}
            </div>
            <div style={{display:'flex',gap:'6px'}}>
              {n.fileData && <a className="btn-secondary btn-sm" href={n.fileData} download={n.fileName} style={{textDecoration:'none'}}>View</a>}
              {canEdit && <button className="btn-danger btn-sm" onClick={()=>delNote(n.id)}>Delete</button>}
            </div>
          </div>
        ))}
        {canEdit && !showAddNote && <div className="btn-row"><button className="btn-secondary btn-sm" onClick={()=>setShowAddNote(true)}>+ Add Character Note</button></div>}
        {canEdit && showAddNote && (
          <div style={{marginTop:'10px'}}>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Title</label><input className="form-input" value={noteForm.title} onChange={e=>setNoteForm({...noteForm,title:e.target.value})}/></div>
              <div className="form-group">
                <label className="form-label">Type</label>
                <select className="form-select" value={noteForm.type} onChange={e=>setNoteForm({...noteForm,type:e.target.value})}>
                  <option>Character Bio</option>
                  <option>Accent Notes</option>
                  <option>Research Material</option>
                  <option>Reference Video</option>
                </select>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Notes / Description</label><textarea className="form-textarea" value={noteForm.content} onChange={e=>setNoteForm({...noteForm,content:e.target.value})}/></div>
            <div className="form-group"><label className="form-label">Attach File (optional)</label><input type="file" className="form-input" onChange={handleNoteFile}/></div>
            <div className="btn-row"><button className="btn btn-sm" onClick={addNote}>Add</button><button className="btn-secondary btn-sm" onClick={()=>setShowAddNote(false)}>Cancel</button></div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============ DEPARTMENT DASHBOARD ============ */
const DEPT_DASH_PRESETS = {
  "Camera":["Shot List","Camera Notes","Equipment Notes","Lens Package Info"],
  "Sound":["Audio Notes","Equipment Needs","Wireless Frequency Updates"],
  "Art Department":["Set Prep Notes","Props List","Build Schedules"],
  "Wardrobe":["Costume Notes","Fittings","Continuity References"],
};

function DeptDashboard({data,currentUser,update,role}){
  const deptName = currentUser.department;
  const canEdit = role==='owner' || role==='producer' ||
    data.departments.some(dp=>dp.name===deptName && dp.head===`${currentUser.firstName} ${currentUser.lastName}`);
  const dash = data.deptDashboards[deptName] || {notes:'', items:[]};
  const [notes,setNotes] = useState(dash.notes);
  const presetLabels = DEPT_DASH_PRESETS[deptName] || ["Department Notes","Equipment Needs","Updates"];
  const [newLabel,setNewLabel] = useState(presetLabels[0]);
  const [newValue,setNewValue] = useState('');

  function saveNotes(){
    update(d=>{
      if(!d.deptDashboards[deptName]) d.deptDashboards[deptName] = {notes:'',items:[]};
      d.deptDashboards[deptName].notes = notes;
    });
  }
  function addItem(){
    if(!newValue.trim()) return;
    update(d=>{
      if(!d.deptDashboards[deptName]) d.deptDashboards[deptName] = {notes:'',items:[]};
      d.deptDashboards[deptName].items.unshift({id:uid(),label:newLabel,value:newValue,date:new Date().toLocaleDateString()});
    });
    setNewValue('');
  }
  function delItem(id){
    update(d=>{
      d.deptDashboards[deptName].items = d.deptDashboards[deptName].items.filter(i=>i.id!==id);
    });
  }

  const deptInfo = data.departments.find(dp=>dp.name===deptName);
  const deptMembers = data.users.filter(u=>u.department===deptName);

  return (
    <div>
      <div className="section-title">{deptName} Dashboard</div>

      {deptInfo && (
        <div className="card">
          <Row label="Department Head" value={deptInfo.head}/>
          <Row label="Contact" value={deptInfo.contact}/>
        </div>
      )}

      <div className="dash-tile">
        <div className="dash-tile-title">Department Notes</div>
        {canEdit ? (
          <>
            <textarea className="form-textarea" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="General notes for the department..."/>
            <div className="btn-row"><button className="btn-secondary btn-sm" onClick={saveNotes}>Save Notes</button></div>
          </>
        ) : (
          <div style={{whiteSpace:'pre-wrap',fontSize:'14px'}}>{notes || '—'}</div>
        )}
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">Updates &amp; Info</div>
        {(dash.items||[]).length===0 && <div className="empty-state">No items posted yet.</div>}
        {(dash.items||[]).map(item=>(
          <div key={item.id} className="version-row">
            <div>
              <div className="version-tag">{item.label}</div>
              <div style={{fontSize:'13px',marginTop:'2px'}}>{item.value}</div>
              <div className="version-meta">{item.date}</div>
            </div>
            {canEdit && <button className="btn-danger btn-sm" onClick={()=>delItem(item.id)}>Delete</button>}
          </div>
        ))}
        {canEdit && (
          <div style={{marginTop:'10px'}}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Category</label>
                <select className="form-select" value={newLabel} onChange={e=>setNewLabel(e.target.value)}>
                  {presetLabels.map(l=><option key={l} value={l}>{l}</option>)}
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Details</label><textarea className="form-textarea" value={newValue} onChange={e=>setNewValue(e.target.value)}/></div>
            <div className="btn-row"><button className="btn btn-sm" onClick={addItem}>Post Update</button></div>
          </div>
        )}
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">{deptName} Team Members</div>
        {deptMembers.length===0 && <div className="empty-state">No one has joined this department yet.</div>}
        {deptMembers.map(u=>(
          <div key={u.id} className="card-row"><span className="value">{u.firstName} {u.lastName}</span><span className="label">{u.position}</span></div>
        ))}
      </div>
    </div>
  );
}

/* ============ PRODUCER DASHBOARD ============ */
function ProducerDashboard({data,currentUser,role}){
  const statusCounts = {upcoming:0,shooting:0,completed:0,changed:0};
  data.schedule.days.forEach(d=>{ if(statusCounts[d.status]!==undefined) statusCounts[d.status]++; });
  const checklistDone = data.checklist.filter(c=>c.checked).length;

  return (
    <div>
      <div className="section-title">Producer Dashboard</div>

      <div className="dash-tile">
        <div className="dash-tile-title">Shooting Progress</div>
        <div className="big-stat">
          <div>
            <div className="num">{data.meta.currentDay}/{data.meta.totalDays}</div>
            <div className="sub">Shoot Days Complete</div>
          </div>
        </div>
        <div className="stat-row">
          <div className="stat-box"><div className="stat-num" style={{color:'var(--green)'}}>{statusCounts.completed}</div><div className="stat-label">Completed</div></div>
          <div className="stat-box"><div className="stat-num">{statusCounts.shooting}</div><div className="stat-label">Shooting Today</div></div>
          <div className="stat-box"><div className="stat-num" style={{color:'var(--gray)'}}>{statusCounts.upcoming}</div><div className="stat-label">Upcoming</div></div>
          <div className="stat-box"><div className="stat-num" style={{color:'var(--red)'}}>{statusCounts.changed}</div><div className="stat-label">Changed</div></div>
        </div>
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">Today's Daily Report</div>
        <Row label="Shoot Day" value={`Day ${data.todaysShoot.day||data.meta.currentDay}`}/>
        <Row label="Scenes" value={data.todaysShoot.scenes}/>
        <Row label="Page Count" value={data.todaysShoot.pageCount}/>
        <Row label="Crew Call / Wrap" value={`${data.todaysShoot.crewCall||'—'} / ${data.todaysShoot.wrap||'—'}`}/>
        <Row label="Daily Checklist" value={`${checklistDone} of ${data.checklist.length} complete`}/>
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">Department Updates</div>
        {Object.keys(data.deptDashboards).length===0 && <div className="empty-state">No department updates yet.</div>}
        {Object.entries(data.deptDashboards).map(([dept,dash])=>(
          (dash.items && dash.items.length>0) && (
            <div key={dept} style={{marginBottom:'10px'}}>
              <div className="version-tag">{dept}</div>
              {dash.items.slice(0,2).map(item=>(
                <div key={item.id} style={{fontSize:'13px',color:'var(--gray)',marginTop:'2px'}}>{item.label}: {item.value}</div>
              ))}
            </div>
          )
        ))}
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">Production Announcements</div>
        {data.announcements.slice(0,3).map(a=>(
          <div key={a.id} className="msg-card" style={{marginBottom:'8px'}}>
            <div className="msg-head"><span className="msg-author">{a.author}</span><span className="msg-meta">{a.date}</span></div>
            <div className="msg-body">{a.text}</div>
          </div>
        ))}
        {data.announcements.length===0 && <div className="empty-state">No announcements yet.</div>}
      </div>

      <div className="dash-tile">
        <div className="dash-tile-title">Budget Status &amp; Investor Updates</div>
        <div className="empty-state">Coming in a future upgrade.</div>
      </div>
    </div>
  );
}


/* ============ USER ROLES PANEL (Owner Only) ============ */
function UserRolesPanel({data,update,currentUser}){
  const canManage = can(currentUser,'manage_user_roles');

  function setRoleOverride(userId, roleOverride){
    if(!canManage) return; // backend-style block
    update(d=>{
      const u = d.users.find(x=>x.id===userId);
      if(u) u.roleOverride = roleOverride || null;
    });
  }

  function setDeptHead(deptName, userId){
    if(!canManage) return; // backend-style block
    const user = data.users.find(u=>u.id===userId);
    update(d=>{
      let dept = d.departments.find(dp=>dp.name===deptName);
      if(!dept){
        dept = {id:uid(),name:deptName,head:'',contact:'',members:'',notes:'',responsibilities:''};
        d.departments.push(dept);
      }
      dept.head = user ? `${user.firstName} ${user.lastName}` : '';
    });
  }

  function removeUser(userId){
    if(!canManage) return; // backend-style block
    const user = data.users.find(u=>u.id===userId);
    if(user && user.isOwner){
      alert("The Owner account cannot be removed.");
      return;
    }
    if(!confirm("Remove this user from the production roster?")) return;
    update(d=>{
      d.users = d.users.filter(u=>u.id!==userId);
      d.departments.forEach(dp=>{
        if(user && dp.head===`${user.firstName} ${user.lastName}`) dp.head='';
      });
    });
  }

  return (
    <div>
      <div className="card">
        <div className="dash-tile-title">Assign Department Heads</div>
        {Object.keys(DEPARTMENT_TREE).map(deptName=>{
          const dept = data.departments.find(dp=>dp.name===deptName);
          const currentHeadName = dept ? dept.head : '';
          const eligible = data.users.filter(u=>u.department===deptName);
          const currentHeadUser = data.users.find(u=>`${u.firstName} ${u.lastName}`===currentHeadName);
          return (
            <div key={deptName} className="form-group">
              <label className="form-label">{deptName}</label>
              <select className="form-select" value={currentHeadUser?currentHeadUser.id:''} onChange={e=>setDeptHead(deptName,e.target.value)}>
                <option value="">No department head assigned</option>
                {eligible.map(u=><option key={u.id} value={u.id}>{u.firstName} {u.lastName} — {u.position}</option>)}
              </select>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="dash-tile-title">All Users &amp; Role Overrides</div>
        {data.users.length===0 && <div className="empty-state">No one has joined the production yet.</div>}
        {data.users.map(u=>{
          const computed = computeRole(u,data);
          return (
            <div key={u.id} className="list-item">
              <div className="list-item-head">
                <div>
                  <div className="list-item-title">{u.firstName} {u.lastName}{u.isOwner?' (Owner)':''}</div>
                  <div className="list-item-sub">{u.department} · {u.position}</div>
                </div>
                <span className="pill">{roleLabel(computed)}</span>
              </div>
              {!u.isOwner && (
                <>
                  <div className="form-group" style={{marginTop:'10px'}}>
                    <label className="form-label">Manual Role Override</label>
                    <select className="form-select" value={u.roleOverride||''} onChange={e=>setRoleOverride(u.id,e.target.value)}>
                      <option value="">Use computed role ({roleLabel(computeRole({...u,roleOverride:null},data))})</option>
                      <option value="producer">Producer / Head of Production</option>
                      <option value="depthead">Department Head</option>
                      <option value="cast">Cast / Actor</option>
                      <option value="crew">Crew / Team Member</option>
                    </select>
                  </div>
                  <div className="btn-row">
                    <button className="btn-danger btn-sm" onClick={()=>removeUser(u.id)}>Remove User</button>
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Admin({data,update,setAuthed,currentUser}){
  // Defense in depth: even though this component only renders for role==='owner',
  // every mutating action re-checks permission before writing to data.
  const isOwner = can(currentUser,'access_admin');

  const [adminTab,setAdminTab] = useState('general');
  const [newPw,setNewPw] = useState('');
  const [newOwnerPw,setNewOwnerPw] = useState('');
  const [newTitle,setNewTitle] = useState(data.meta.title);
  const [bannerText,setBannerText] = useState(data.banner.text);
  const [bannerPinned,setBannerPinned] = useState(data.banner.pinned);
  const [showResetConfirm,setShowResetConfirm] = useState(false);

  function changePassword(){
    if(!can(currentUser,'change_production_password')) return; // backend-style block
    if(!newPw.trim()) return;
    update(d=>{d.meta.password = newPw;});
    setNewPw('');
    alert("Production password updated.");
  }
  function changeOwnerPassword(){
    if(!can(currentUser,'change_owner_password')) return; // backend-style block
    if(!newOwnerPw.trim()) return;
    update(d=>{d.meta.ownerPassword = newOwnerPw;});
    setNewOwnerPw('');
    alert("Owner password updated. Keep this private — it gives permanent full access across all productions.");
  }
  function changeTitle(){
    if(!can(currentUser,'global_settings')) return; // backend-style block
    update(d=>{d.meta.title = newTitle;});
    alert("Production title updated.");
  }
  function changeDays(field,val){
    if(!can(currentUser,'global_settings')) return; // backend-style block
    update(d=>{d.meta[field] = parseInt(val)||0;});
  }
  function toggleDeptHeadsUrgent(){
    if(!can(currentUser,'global_settings')) return; // backend-style block
    update(d=>{d.meta.deptHeadsCanUrgent = !d.meta.deptHeadsCanUrgent;});
  }
  function saveBanner(){
    if(!can(currentUser,'global_settings')) return; // backend-style block
    update(d=>{d.banner = {text:bannerText,pinned:bannerPinned};});
  }
  function resetProduction(){
    if(!can(currentUser,'reset_production')) return; // backend-style block
    update(d=>{
      const newMeta = {...d.meta, currentDay:1, resetVersion:(d.meta.resetVersion||1)+1};
      Object.assign(d, JSON.parse(JSON.stringify(DEFAULT_DATA)));
      d.meta = newMeta;
      d.meta.title = "NEW PRODUCTION";
    });
    setShowResetConfirm(false);
    setAuthed(false);
  }

  if(!isOwner) return <AccessDenied/>;

  return (
    <div>
      <div className="section-title">Admin Control Panel</div>

      <div className="tabs-row">
        <button className={"tab-btn"+(adminTab==='general'?' active':'')} onClick={()=>setAdminTab('general')}>General</button>
        <button className={"tab-btn"+(adminTab==='users'?' active':'')} onClick={()=>setAdminTab('users')}>Users &amp; Roles</button>
        <button className={"tab-btn"+(adminTab==='banner'?' active':'')} onClick={()=>setAdminTab('banner')}>Banner</button>
        <button className={"tab-btn"+(adminTab==='checklist'?' active':'')} onClick={()=>setAdminTab('checklist')}>Checklist</button>
        <button className={"tab-btn"+(adminTab==='reset'?' active':'')} onClick={()=>setAdminTab('reset')}>Reset</button>
      </div>

      {adminTab==='general' && (
        <div className="card">
          <div className="form-group">
            <label className="form-label">Production Title</label>
            <input className="form-input" value={newTitle} onChange={e=>setNewTitle(e.target.value)}/>
            <div className="btn-row"><button className="btn-secondary btn-sm" onClick={changeTitle}>Update Title</button></div>
          </div>

          <div className="form-group" style={{marginTop:'20px'}}>
            <label className="form-label">Production Password</label>
            <input className="form-input" type="text" placeholder="New password" value={newPw} onChange={e=>setNewPw(e.target.value)}/>
            <div className="btn-row"><button className="btn-secondary btn-sm" onClick={changePassword}>Update Password</button></div>
          </div>

          <div className="form-group" style={{marginTop:'20px'}}>
            <label className="form-label">Owner Password (Permanent Access — Keep Private)</label>
            <input className="form-input" type="text" placeholder="New owner password" value={newOwnerPw} onChange={e=>setNewOwnerPw(e.target.value)}/>
            <div className="btn-row"><button className="btn-secondary btn-sm" onClick={changeOwnerPassword}>Update Owner Password</button></div>
          </div>

          <div className="form-row" style={{marginTop:'20px'}}>
            <div className="form-group">
              <label className="form-label">Current Shoot Day</label>
              <input className="form-input" type="number" value={data.meta.currentDay} onChange={e=>changeDays('currentDay',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Total Shoot Days</label>
              <input className="form-input" type="number" value={data.meta.totalDays} onChange={e=>changeDays('totalDays',e.target.value)}/>
            </div>
          </div>

          <div className="check-item" style={{marginTop:'20px'}} onClick={toggleDeptHeadsUrgent}>
            <div className={"check-box"+(data.meta.deptHeadsCanUrgent?' checked':'')}>{data.meta.deptHeadsCanUrgent?'✓':''}</div>
            <div className="check-label">Allow Department Heads to send production-wide Urgent Alerts</div>
          </div>
        </div>
      )}

      {adminTab==='users' && <UserRolesPanel data={data} update={update} currentUser={currentUser}/>}

      {adminTab==='banner' && (
        <div className="card">
          <div className="form-group">
            <label className="form-label">Quick Announcement Banner</label>
            <textarea className="form-textarea" placeholder="e.g. Lunch moved to 1:30 PM at base camp." value={bannerText} onChange={e=>setBannerText(e.target.value)}/>
          </div>
          <div className="check-item" onClick={()=>setBannerPinned(!bannerPinned)}>
            <div className={"check-box"+(bannerPinned?' checked':'')}>{bannerPinned?'✓':''}</div>
            <div className="check-label">Mark as pinned / urgent</div>
          </div>
          <div className="btn-row">
            <button className="btn" onClick={saveBanner}>Save Banner</button>
            <button className="btn-secondary" onClick={()=>{setBannerText('');setBannerPinned(false);update(d=>{d.banner={text:'',pinned:false};});}}>Clear Banner</button>
          </div>
        </div>
      )}

      {adminTab==='checklist' && (
        <div className="card">
          <Checklist data={data} update={update}/>
        </div>
      )}

      {adminTab==='reset' && (
        <div className="card" style={{borderColor:'var(--red)'}}>
          <div className="warn-text" style={{color:'var(--red)',fontWeight:700,marginBottom:'10px'}}>RESET FOR NEW PRODUCTION</div>
          <div className="warn-text">
            This clears the current schedule, documents, announcements, messages, departments, crew list, shoot days, scenes, script versions, character notes, and resets the daily checklist. Your Owner password stays the same so you retain access. The production password and title will need to be set again.
          </div>
          <button className="btn-danger" onClick={()=>setShowResetConfirm(true)}>Reset for New Production</button>
        </div>
      )}

      {showResetConfirm && (
        <div className="modal-overlay">
          <div className="modal">
            <h3 style={{color:'var(--red)'}}>Confirm Reset</h3>
            <div className="warn-text">
              Are you sure? This will remove the current schedule, documents, messages, departments, and crew list. This action cannot be undone.
            </div>
            <div className="btn-row">
              <button className="btn-danger" onClick={resetProduction}>Yes, Reset Everything</button>
              <button className="btn-secondary" onClick={()=>setShowResetConfirm(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
