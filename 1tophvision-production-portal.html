<!DOCTYPE html>
<meta charset="UTF-8">
<style>
:root{
  --black:#0a0a0c;
  --panel:#141417;
  --panel-2:#1c1c20;
  --line:#2e2e34;
  --white:#f5f5f0;
  --gray:#8a8a92;
  --gray-dim:#5c5c63;
  --amber:#d4a843;
  --red:#b3413a;
  --green:#4a7c59;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --sans:'Inter',-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--black);
  color:var(--white);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#root{min-height:100vh;}

/* ---------- LOGIN ---------- */
.login-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:
    radial-gradient(ellipse at 50% 0%, rgba(212,168,67,0.05), transparent 60%),
    var(--black);
  position:relative;
}
.login-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size:40px 40px;pointer-events:none;
}
.login-box{
  width:100%;max-width:380px;position:relative;z-index:1;
}
.brand-mark{
  font-family:var(--mono);font-size:11px;letter-spacing:4px;color:var(--amber);
  text-transform:uppercase;margin-bottom:8px;text-align:center;
}
.brand-name{
  font-family:var(--sans);font-weight:800;font-size:28px;letter-spacing:1px;
  text-align:center;margin-bottom:4px;
}
.brand-sub{
  font-family:var(--mono);font-size:12px;color:var(--gray);text-align:center;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:36px;
}
.login-card{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:28px;
}
.login-label{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--gray);
  text-transform:uppercase;margin-bottom:10px;display:block;
}
.login-input{
  width:100%;background:var(--black);border:1px solid var(--line);color:var(--white);
  padding:14px 16px;font-size:16px;border-radius:2px;font-family:var(--mono);
  letter-spacing:2px;
}
.login-input:focus{outline:none;border-color:var(--amber);}
.login-btn{
  width:100%;background:var(--amber);color:var(--black);border:none;
  padding:14px;font-weight:700;font-size:14px;letter-spacing:2px;text-transform:uppercase;
  border-radius:2px;margin-top:16px;cursor:pointer;font-family:var(--sans);
  transition:opacity 0.15s;
}
.login-btn:active{opacity:0.8;}
.login-error{
  color:var(--red);font-family:var(--mono);font-size:12px;margin-top:12px;
  text-align:center;letter-spacing:1px;
}
.login-footer{
  text-align:center;margin-top:24px;font-family:var(--mono);font-size:10px;
  color:var(--gray-dim);letter-spacing:1px;
}

/* ---------- APP SHELL ---------- */
.app{display:flex;flex-direction:column;min-height:100vh;}
.header{
  background:var(--panel);border-bottom:1px solid var(--line);
  padding:14px 16px;position:sticky;top:0;z-index:50;
}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.header-title{font-weight:800;font-size:17px;letter-spacing:1px;line-height:1.2;}
.header-tag{
  font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:2px;
  text-transform:uppercase;margin-top:2px;
}
.logout-btn{
  background:transparent;border:1px solid var(--line);color:var(--gray);
  font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 12px;
  border-radius:2px;cursor:pointer;text-transform:uppercase;white-space:nowrap;
}
.header-meta{
  display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;
}
.meta-item{font-family:var(--mono);font-size:11px;color:var(--gray);}
.meta-item b{color:var(--white);font-weight:600;}
.banner{
  margin-top:10px;background:var(--panel-2);border-left:3px solid var(--amber);
  padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:8px;
}
.banner-pin{color:var(--amber);font-family:var(--mono);font-size:10px;letter-spacing:1px;}

/* ---------- NAV ---------- */
.nav{
  display:flex;overflow-x:auto;background:var(--panel);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:40;-webkit-overflow-scrolling:touch;
}
.nav::-webkit-scrollbar{display:none;}
.nav-item{
  flex:0 0 auto;padding:12px 16px;font-family:var(--mono);font-size:11px;
  letter-spacing:1.5px;color:var(--gray);text-transform:uppercase;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
}
.nav-item.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ---------- MAIN ---------- */
.main{flex:1;padding:16px;max-width:760px;width:100%;margin:0 auto;}
.section-title{
  font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--amber);
  text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--line);}
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;
  padding:18px;margin-bottom:14px;
}
.card-row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);}
.card-row:last-child{border-bottom:none;}
.card-row .label{font-family:var(--mono);font-size:11px;color:var(--gray);letter-spacing:1px;text-transform:uppercase;}
.card-row .value{font-size:14px;font-weight:600;text-align:right;}
.big-stat{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
  flex-wrap:wrap;gap:10px;
}
.big-stat .num{font-size:42px;font-weight:800;line-height:1;font-family:var(--mono);}
.big-stat .sub{font-family:var(--mono);font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.status-tag{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:2px;border:1px solid var(--line);
}
.status-shooting{color:var(--amber);border-color:var(--amber);}
.status-completed{color:var(--green);border-color:var(--green);}
.status-upcoming{color:var(--gray);}
.status-changed{color:var(--red);border-color:var(--red);}

/* ---------- BUTTONS / FORMS ---------- */
.btn{
  background:var(--amber);color:var(--black);border:none;font-weight:700;
  font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:12px 18px;
  border-radius:2px;cursor:pointer;font-family:var(--sans);
}
.btn-secondary{
  background:transparent;color:var(--white);border:1px solid var(--line);
  font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;
  padding:12px 18px;border-radius:2px;cursor:pointer;font-family:var(--sans);
}
.btn-danger{
  background:transparent;color:var(--red);border:1px solid var(--red);
  font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;
  padding:10px 14px;border-radius:2px;cursor:pointer;font-family:var(--sans);
}
.btn-sm{padding:7px 12px;font-size:11px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;}
.form-group{margin-bottom:14px;}
.form-label{
  display:block;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;
  color:var(--gray);text-transform:uppercase;margin-bottom:6px;
}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--black);border:1px solid var(--line);color:var(--white);
  padding:11px 12px;font-size:14px;border-radius:2px;font-family:var(--sans);
}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--amber);}
.form-textarea{resize:vertical;min-height:70px;}
.form-row{display:flex;gap:10px;}
.form-row > *{flex:1;}
.empty-state{
  text-align:center;padding:36px 16px;color:var(--gray-dim);font-family:var(--mono);
  font-size:12px;letter-spacing:1px;
}
.pill{
  display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--amber);border:1px solid var(--amber);
  padding:2px 8px;border-radius:2px;margin-right:6px;
}

/* ---------- ANNOUNCEMENTS / WALL ---------- */
.msg-card{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px;margin-bottom:10px;
}
.msg-card.pinned{border-color:var(--amber);}
.msg-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;}
.msg-author{font-weight:700;font-size:13px;}
.msg-meta{font-family:var(--mono);font-size:10px;color:var(--gray-dim);letter-spacing:1px;}
.msg-body{font-size:14px;line-height:1.5;color:#dcdcd6;}
.msg-tags{margin-top:8px;}
.msg-actions{margin-top:10px;display:flex;gap:8px;}

/* ---------- TABLES / LIST ITEMS ---------- */
.list-item{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px;margin-bottom:10px;
}
.list-item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.list-item-title{font-weight:700;font-size:14px;}
.list-item-sub{font-family:var(--mono);font-size:11px;color:var(--gray);margin-top:2px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.detail-grid .label{font-family:var(--mono);font-size:10px;color:var(--gray-dim);letter-spacing:1px;text-transform:uppercase;}
.detail-grid .value{font-size:13px;margin-top:2px;}

/* ---------- CHECKLIST ---------- */
.check-item{
  display:flex;align-items:center;gap:12px;padding:12px;background:var(--panel);
  border:1px solid var(--line);border-radius:2px;margin-bottom:8px;cursor:pointer;
}
.check-box{
  width:20px;height:20px;border:1px solid var(--gray);border-radius:2px;flex:0 0 20px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
}
.check-box.checked{background:var(--green);border-color:var(--green);color:var(--black);font-weight:700;}
.check-label{font-size:14px;}
.check-label.checked{color:var(--gray-dim);text-decoration:line-through;}

/* ---------- LOGIN GATE (admin) ---------- */
.tabs-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{
  background:transparent;border:1px solid var(--line);color:var(--gray);
  font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
  padding:8px 14px;border-radius:2px;cursor:pointer;
}
.tab-btn.active{color:var(--amber);border-color:var(--amber);}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;
  justify-content:center;z-index:100;padding:16px;
}
.modal{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:24px;
  max-width:420px;width:100%;max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:16px;margin-bottom:14px;letter-spacing:1px;}
.warn-text{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:18px;}

.loading-msg{
  text-align:center;padding:60px 20px;font-family:var(--mono);font-size:12px;
  color:var(--gray);letter-spacing:2px;text-transform:uppercase;
}
.field-display{font-size:14px;}
.dept-head-block{
  border-left:2px solid var(--amber);padding-left:12px;margin-top:10px;
}
@media (max-width:480px){
  .detail-grid{grid-template-columns:1fr;}
  .big-stat .num{font-size:34px;}
}

/* ---------- ONBOARDING ---------- */
.onboard-screen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;background:var(--black);position:relative;
}
.onboard-box{width:100%;max-width:440px;position:relative;z-index:1;}
.dept-group-label{
  font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gray-dim);
  text-transform:uppercase;margin:14px 0 6px;
}

/* ---------- URGENT ALERT ---------- */
.urgent-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;
  justify-content:center;z-index:200;padding:16px;
}
.urgent-box{
  background:var(--panel);border:2px solid var(--red);border-radius:2px;padding:24px;
  max-width:420px;width:100%;
}
.urgent-label{
  font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--red);
  text-transform:uppercase;margin-bottom:10px;font-weight:700;
}
.urgent-text{font-size:16px;line-height:1.5;margin-bottom:18px;}

/* ---------- WELCOME / HOME ---------- */
.welcome-card{
  background:var(--panel);border:1px solid var(--amber);border-radius:2px;padding:18px;margin-bottom:14px;
}
.welcome-name{font-size:18px;font-weight:800;margin-bottom:4px;}
.welcome-meta{font-family:var(--mono);font-size:11px;color:var(--gray);letter-spacing:1px;margin-bottom:2px;}
.stat-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.stat-box{
  flex:1;min-width:90px;background:var(--black);border:1px solid var(--line);border-radius:2px;
  padding:10px;text-align:center;
}
.stat-box .stat-num{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--amber);}
.stat-box .stat-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--gray);text-transform:uppercase;margin-top:2px;}

/* ---------- NOTIFICATIONS / MESSAGE CENTER ---------- */
.notif-badge{
  display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:var(--white);
  font-family:var(--mono);font-size:10px;font-weight:700;border-radius:50%;width:18px;height:18px;
  margin-left:6px;
}
.notif-card{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px;margin-bottom:10px;
  position:relative;
}
.notif-card.unread{border-left:3px solid var(--amber);}
.notif-card.urgent{border-color:var(--red);}
.notif-target{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--amber);text-transform:uppercase;margin-bottom:6px;}
.read-status{
  font-family:var(--mono);font-size:11px;color:var(--gray);letter-spacing:1px;margin-top:8px;
}
.read-list{
  margin-top:8px;font-size:12px;color:var(--gray);max-height:140px;overflow-y:auto;
  border-top:1px solid var(--line);padding-top:8px;
}
.read-list-row{display:flex;justify-content:space-between;padding:3px 0;}
.read-yes{color:var(--green);}
.read-no{color:var(--gray-dim);}

/* ---------- SEND MESSAGE FORM ---------- */
.target-select-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}

/* ---------- DASHBOARD CARDS ---------- */
.dash-tile{
  background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:14px;margin-bottom:10px;
}
.dash-tile-title{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--amber);
  text-transform:uppercase;margin-bottom:10px;
}
.version-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);}
.version-row:last-child{border-bottom:none;}
.version-tag{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amber);}
.version-meta{font-family:var(--mono);font-size:10px;color:var(--gray);}
</style>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useCallback} = React;

const DEPARTMENT_TREE = {
  "Cast":["Lead Actor","Supporting Actor","Day Player","Background"],
  "Producers":["Executive Producer","Producer","Co-Producer","Associate Producer"],
  "Director Team":["Director","1st AD","2nd AD","Script Supervisor"],
  "Camera":["DP","Camera Operator","1st AC","2nd AC","DIT"],
  "G&E":["Gaffer","Key Grip","Grip","Electric"],
  "Sound":["Production Sound Mixer","Boom Operator"],
  "Art Department":["Production Designer","Art Director","Props"],
  "Wardrobe":["Wardrobe Supervisor","Costumer","Set Costumer"],
  "Hair & Makeup":["Key Makeup Artist","Key Hair Stylist","Makeup Artist","Hair Stylist"],
  "Locations":["Location Manager","Assistant Location Manager","Location Scout"],
  "Transportation":["Transportation Coordinator","Driver"],
  "Production Assistants":["Key PA","Set PA","Office PA"],
  "Marketing / BTS":["BTS Photographer","Social Media Coordinator","Marketing Lead"],
  "Post Production":["Editor","Assistant Editor","VFX","Colorist"]
};

const DEFAULT_DATA = {
  meta:{
    title:"PRODUCTION TITLE",
    password:"blackline2026",
    ownerPassword:"tophvision2026",
    currentDay:1,
    totalDays:18,
    resetVersion:1,
    deptHeadsCanUrgent:false
  },
  banner:{text:"",pinned:false},
  todaysShoot:{
    day:1,date:"",crewCall:"",castCalls:"",location:"",parking:"",scenes:"",
    pageCount:"",wrap:"",weather:"",notes:"",safety:"",deptNotes:""
  },
  schedule:{
    uploadedLabel:"",
    fileName:"",
    fileData:"", // base64 for uploaded file
    fileType:"",
    uploadedBy:"",
    version:1,
    days:[] // ShootDay objects, see below
    /* ShootDay: {id,day,date,status,crewCall,castCalls,location,parking,scenes,
       pageCount,wrap,deptNotes,safety,meal,attachments:[{id,name,fileData,fileType}],
       callSheet:{fileData,fileName}, sides:{fileData,fileName}} */
  },
  documents:[], // {id,name,category,date,fileData,fileType,visibility:{type:'everyone'|'producers'|'department'|'cast'|'owner',value:string|null},uploadedBy}
  announcements:[], // {id,text,author,date,pinned}
  messages:[], // {id,author,authorId,dept,text,date,pinned,channel}
  departments:[], // {id,name,head,contact,members,notes,responsibilities}
  crew:[], // {id,name,role,department,phone,email,emergency,notes,callTime}
  checklist:[
    {id:1,label:"Call sheet uploaded",checked:false},
    {id:2,label:"Sides uploaded",checked:false},
    {id:3,label:"Location confirmed",checked:false},
    {id:4,label:"Parking confirmed",checked:false},
    {id:5,label:"Cast confirmed",checked:false},
    {id:6,label:"Crew confirmed",checked:false},
    {id:7,label:"Equipment confirmed",checked:false},
    {id:8,label:"Lunch confirmed",checked:false},
    {id:9,label:"Safety briefing completed",checked:false},
    {id:10,label:"Wrap report uploaded",checked:false},
  ],
  // ---- New systems ----
  users:[], // {id,firstName,lastName,email,phone,department,position,joinedAt,role}
  notifications:[], // {id,text,date,author,authorId,urgent,target:{type:'all'|'department'|'user',value:string|null}, reads:{userId:timestamp}}
  myScenes:[], // {id,sceneNumbers,shootDate,callTime,status}
  scriptVersions:[], // {id,version,revisionDate,uploadedBy,note,fileData,fileName}
  characterNotes:[], // {id,title,type,content,fileData,fileName}
  deptDashboards:{} // {deptName:{notes:string, items:[{id,label,value}]}}
};

const DOC_VISIBILITY_OPTIONS = [
  {value:'everyone',label:'Everyone'},
  {value:'producers',label:'Producers Only'},
  {value:'department',label:'Specific Department'},
  {value:'cast',label:'Cast Only'},
  {value:'owner',label:'Owner Only'}
];

const MESSAGE_CHANNELS = ["General","Announcements","Urgent Updates"]; // plus one per department, added dynamically

/* ============ PERMISSION SYSTEM ============
   Roles: 'owner' | 'producer' | 'depthead' | 'cast' | 'crew'
   All permission checks MUST go through can() — UI hiding alone is not enforcement.
*/
function can(currentUser, action, ctx={}){
  if(!currentUser) return false;
  const role = currentUser.role;

  switch(action){
    // ---- Admin / system ----
    case 'access_admin':
    case 'change_owner_password':
    case 'change_production_password':
    case 'reset_production':
    case 'manage_user_roles':
    case 'remove_owner':
    case 'global_settings':
      return role === 'owner';

    // ---- Schedule / shoot days ----
    case 'edit_shoot_days':
    case 'upload_schedule':
    case 'delete_schedule':
      return role === 'owner' || role === 'producer';

    case 'add_dept_note_to_shoot_day':
      return role === 'owner' || role === 'producer' ||
        (role === 'depthead' && ctx.department === currentUser.department);

    // ---- Documents ----
    case 'upload_production_document':
      return role === 'owner' || role === 'producer';
    case 'upload_department_document':
      return role === 'owner' || role === 'producer' ||
        (role === 'depthead' && ctx.department === currentUser.department);
    case 'delete_document':
      return role === 'owner' || role === 'producer';
    case 'view_document':
      if(!ctx.visibility) return true;
      switch(ctx.visibility.type){
        case 'everyone': return true;
        case 'producers': return role === 'owner' || role === 'producer';
        case 'department': return role === 'owner' || role === 'producer' || currentUser.department === ctx.visibility.value;
        case 'cast': return role === 'owner' || role === 'producer' || currentUser.department === 'Cast';
        case 'owner': return role === 'owner';
        default: return true;
      }

    // ---- Announcements ----
    case 'post_announcement':
      return role === 'owner' || role === 'producer';

    // ---- Message wall ----
    case 'delete_any_message':
      return role === 'owner';
    case 'pin_production_message':
      return role === 'owner' || role === 'producer';
    case 'pin_department_message':
      return role === 'owner' || role === 'producer' || role === 'depthead';
    case 'delete_own_message':
      return true; // anyone can delete their own post

    // ---- Notifications ----
    case 'send_notification_all':
    case 'send_notification_to_role':
      return role === 'owner' || role === 'producer';
    case 'send_urgent_alert':
      if(role === 'owner' || role === 'producer') return true;
      if(role === 'depthead') return !!ctx.deptHeadsCanUrgent;
      return false;
    case 'send_notification_role_group':
      return role === 'owner' || role === 'producer';
    case 'send_notification_to_department':
      return role === 'owner' || role === 'producer' ||
        (role === 'depthead' && ctx.department === currentUser.department);
    case 'send_notification_to_user':
      if(role === 'owner' || role === 'producer') return true;
      if(role === 'depthead') return ctx.targetUserDepartment === currentUser.department;
      return false;

    default:
      return false;
  }
}

function roleLabel(role){
  switch(role){
    case 'owner': return 'Owner';
    case 'producer': return 'Producer / Head of Production';
    case 'depthead': return 'Department Head';
    case 'cast': return 'Cast / Actor';
    case 'crew': return 'Crew / Team Member';
    default: return 'Unknown';
  }
}

// Compute a user's role from their profile + department/head assignments
function computeRole(user, data){
  if(!user) return 'crew';
  if(user.isOwner) return 'owner';
  if(user.roleOverride) return user.roleOverride; // Owner can manually assign roles
  // Self-selecting "Producers" during onboarding does NOT automatically grant
  // production-management permissions — the Owner must confirm via Users & Roles.
  if(user.department === 'Producers') return 'crew';
  const isHead = data.departments.some(dp=>dp.head === `${user.firstName} ${user.lastName}`);
  if(isHead) return 'depthead';
  if(user.department === 'Cast') return 'cast';
  return 'crew';
}

const STORAGE_KEY = "tophvision-portal-data";
const USER_KEY = "tophvision-portal-user";
const ADMIN_KEY = "tophvision-portal-admin-unlocked";
// Permanent recovery key, independent of stored data. If the saved owner
// password is lost, forgotten, or corrupted, this always works and resets
// the owner password back to the default ("tophvision2026") on use.
const MASTER_RECOVERY_KEY = "tophvision-master-reset-9981";

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtDate(d){
  if(!d) return "—";
  try{
    const dt = new Date(d+"T00:00:00");
    return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  }catch(e){return d;}
}
function today(){
  return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

// Determine if a notification targets a given user
function notifTargets(notif, user, data){
  if(!notif.target || notif.target.type==='all') return true;
  if(notif.target.type==='department') return user && user.department===notif.target.value;
  if(notif.target.type==='user') return user && user.id===notif.target.value;
  if(notif.target.type==='role'){
    if(!user) return false;
    const r = data ? computeRole(user,data) : user.role;
    if(notif.target.value==='producers') return r==='producer';
    if(notif.target.value==='depthead') return r==='depthead';
    if(notif.target.value==='cast') return user.department==='Cast';
    if(notif.target.value==='crew') return r==='crew';
    return false;
  }
  return false;
}

function App(){
  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(true);
  const [authed,setAuthed] = useState(false);
  const [pwInput,setPwInput] = useState("");
  const [loginError,setLoginError] = useState("");
  const [tab,setTab] = useState("home");
  const [saveTick,setSaveTick] = useState(0);
  const [currentUser,setCurrentUser] = useState(null); // local profile
  const [needsOnboard,setNeedsOnboard] = useState(false);
  const [dismissedAlerts,setDismissedAlerts] = useState([]);
  const [adminUnlocked,setAdminUnlocked] = useState(false); // legacy, retained for storage cleanup only
  const [ownerMode,setOwnerMode] = useState(false);
  const [loginLoading,setLoginLoading] = useState(false);
  const [showRecoveryNotice,setShowRecoveryNotice] = useState(false);

  useEffect(()=>{
    (async()=>{
      try{
        const res = await window.storage.get(STORAGE_KEY, true);
        if(res && res.value){
          const parsed = JSON.parse(res.value);
          // merge with defaults for safety on older saved data
          setData({...JSON.parse(JSON.stringify(DEFAULT_DATA)), ...parsed,
            meta: {...DEFAULT_DATA.meta, ...(parsed.meta||{})},
            users: parsed.users||[],
            notifications: parsed.notifications||[],
            myScenes: parsed.myScenes||[],
            scriptVersions: parsed.scriptVersions||[],
            characterNotes: parsed.characterNotes||[],
            deptDashboards: parsed.deptDashboards||{}
          });
        }else{
          setData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
        }
      }catch(e){
        setData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
      }
      // local user profile (per-device, not shared)
      try{
        const localUser = localStorage && localStorage.getItem ? null : null; // placeholder, real storage below
      }catch(e){}
      setLoading(false);
    })();
  },[]);

  // load local user profile + admin unlock state
  useEffect(()=>{
    (async()=>{
      try{
        const res = await window.storage.get(USER_KEY, false);
        if(res && res.value){
          setCurrentUser(JSON.parse(res.value));
        }
      }catch(e){}
      try{
        const res2 = await window.storage.get(ADMIN_KEY, false);
        if(res2 && res2.value === "true"){
          setAdminUnlocked(true);
        }
      }catch(e){}
    })();
  },[]);

  // persist shared data on change (debounced-ish via tick)
  useEffect(()=>{
    if(!data || loading) return;
    const t = setTimeout(()=>{
      window.storage.set(STORAGE_KEY, JSON.stringify(data), true).catch(()=>{});
    }, 400);
    return ()=>clearTimeout(t);
  },[data,saveTick]);

  function update(fn){
    setData(prev=>{
      const next = JSON.parse(JSON.stringify(prev));
      fn(next);
      return next;
    });
  }

  async function tryLogin(){
    if(loginLoading) return;
    if(!data){
      setLoginError("System is still loading. Please wait a moment and try again.");
      return;
    }
    if(!pwInput.trim()){
      setLoginError(ownerMode ? "Please enter the owner password." : "Please enter the production password.");
      return;
    }

    setLoginLoading(true);
    setLoginError("");

    try{
      if(ownerMode){
        const isRecovery = pwInput === MASTER_RECOVERY_KEY;
        const isOwnerPw = data && data.meta && pwInput === data.meta.ownerPassword;
        if(isOwnerPw || isRecovery){
          const ownerRecord = (currentUser && currentUser.isOwner) ? currentUser : {
            firstName:"Topher", lastName:"Hall", email:"toph@tophvision.com", phone:"",
            department:"Owner", position:"Founder / CEO",
            isOwner:true, role:'owner',
            id: (currentUser && currentUser.id) || uid(), joinedAt:new Date().toISOString()
          };
          // Set state first — never let storage errors block login
          setCurrentUser(ownerRecord);
          setAuthed(true);
          setNeedsOnboard(false);
          setLoginError("");
          if(isRecovery){
            setShowRecoveryNotice(true);
            // Reset password in data and persist — non-blocking, errors are swallowed
            update(d=>{
              if(!d.users.some(u=>u.id===ownerRecord.id)) d.users.push(ownerRecord);
              d.meta.ownerPassword = "tophvision2026";
            });
          } else {
            update(d=>{
              if(!d.users.some(u=>u.id===ownerRecord.id)) d.users.push(ownerRecord);
            });
          }
          // Persist user profile — non-blocking
          try{
            if(window.storage && typeof window.storage.set === 'function'){
              window.storage.set(USER_KEY, JSON.stringify(ownerRecord), false);
            }
          }catch(e){ /* non-fatal */ }
        }else{
          setLoginError("Incorrect owner password.");
        }
      }else{
        if(data && data.meta && pwInput === data.meta.password){
          setAuthed(true);
          setLoginError("");
          if(!currentUser){
            setNeedsOnboard(true);
          }
        }else{
          setLoginError("Incorrect production password.");
        }
      }
    }catch(err){
      // Show the actual error for debugging
      setLoginError("Error: " + (err && err.message ? err.message : String(err)));
    }finally{
      setLoginLoading(false);
    }
  }

  function completeOnboard(profile){
    const userRecord = {...profile, id: uid(), joinedAt:new Date().toISOString()};
    setCurrentUser(userRecord);
    window.storage.set(USER_KEY, JSON.stringify(userRecord), false).catch(()=>{});
    update(d=>{
      d.users.push(userRecord);
    });
    setNeedsOnboard(false);
  }

  function markNotifRead(notifId){
    if(!currentUser) return;
    update(d=>{
      const n = d.notifications.find(x=>x.id===notifId);
      if(n){
        if(!n.reads) n.reads = {};
        if(!n.reads[currentUser.id]) n.reads[currentUser.id] = new Date().toISOString();
      }
    });
  }

  function switchProfile(){
    if(!confirm("Switch profile? You'll be asked to join the production team again on this device.")) return;
    setCurrentUser(null);
    window.storage.delete(USER_KEY, false).catch(()=>{});
    window.storage.delete(ADMIN_KEY, false).catch(()=>{});
    setNeedsOnboard(true);
    setAdminUnlocked(false);
  }

  if(loading || !data){
    return <div className="loading-msg">LOADING PRODUCTION PORTAL...</div>;
  }

  if(!authed){
    return (
      <div className="login-screen">
        <div className="login-grid"></div>
        <div className="login-box">
          <div className="brand-mark">TophVision Studios</div>
          <div className="brand-name">PRODUCTION PORTAL</div>
          <div className="brand-sub">{ownerMode ? 'Owner Access — TophVision Studios' : 'Private Access — Cast & Crew Only'}</div>
          {ownerMode && (
            <div style={{textAlign:'center',marginBottom:'12px'}}>
              <span className="pill" style={{borderColor:'var(--amber)',color:'var(--amber)'}}>OWNER MODE</span>
            </div>
          )}

          {showRecoveryNotice && (
            <div style={{background:'#1c2e1c',border:'1px solid var(--green)',borderRadius:'2px',padding:'14px',marginBottom:'14px'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:'11px',color:'var(--green)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'6px'}}>Recovery Successful</div>
              <div style={{fontSize:'13px',lineHeight:'1.5'}}>Owner password reset to: <strong style={{fontFamily:'var(--mono)'}}>tophvision2026</strong></div>
              <div style={{fontSize:'12px',color:'var(--gray)',marginTop:'6px'}}>Go to Owner Admin → General → Owner Password to set a new one.</div>
            </div>
          )}

          <div className="login-card">
            <label className="login-label">{ownerMode ? 'Enter Owner Password' : 'Enter Production Password'}</label>
            <input
              type="password"
              className="login-input"
              value={pwInput}
              onChange={e=>{setPwInput(e.target.value);setLoginError("");}}
              onKeyDown={e=>{if(e.key==='Enter') tryLogin();}}
              placeholder="••••••••••"
              autoFocus
            />
            <button
              className="login-btn"
              disabled={loginLoading}
              onClick={tryLogin}
              style={loginLoading?{opacity:0.6,cursor:'default'}:{}}
            >
              {loginLoading ? 'Checking...' : (ownerMode ? 'Enter as Owner' : 'Enter Production')}
            </button>
            {loginError && (
              <div className="login-error" style={{marginTop:'12px',fontSize:'13px',lineHeight:'1.4'}}>
                {loginError}
              </div>
            )}
          </div>

          <div
            className="login-footer"
            style={{marginTop:'18px',cursor:'pointer',textDecoration:'underline',letterSpacing:'1px'}}
            onClick={()=>{setOwnerMode(!ownerMode);setLoginError("");setPwInput("");setShowRecoveryNotice(false);}}
          >
            {ownerMode ? '← Back to Production Login' : 'Owner Access'}
          </div>
          <div className="login-footer">TOPHVISION STUDIOS // SECURE PRODUCTION SYSTEM</div>
        </div>
      </div>
    );
  }

  if(needsOnboard || !currentUser){
    return <Onboarding onComplete={completeOnboard} title={data.meta.title}/>;
  }

  const role = computeRole(currentUser, data);
  // Keep currentUser.role in sync with computed role for permission checks (e.g. depthead via assignment)
  const effectiveUser = {...currentUser, role};

  // Active urgent alerts targeted at this user, not yet dismissed, not yet read
  const urgentAlerts = data.notifications.filter(n=>
    n.urgent && notifTargets(n,currentUser,data) &&
    !dismissedAlerts.includes(n.id) &&
    !(n.reads && n.reads[currentUser.id])
  );

  return (
    <div className="app">
      {urgentAlerts.length>0 && (
        <UrgentAlert
          alert={urgentAlerts[0]}
          onDismiss={()=>{
            markNotifRead(urgentAlerts[0].id);
            setDismissedAlerts(prev=>[...prev,urgentAlerts[0].id]);
          }}
        />
      )}
      <Header data={data} currentUser={effectiveUser} role={role} setAuthed={setAuthed} setPwInput={setPwInput} switchProfile={switchProfile}/>
      <Nav tab={tab} setTab={setTab} role={role} currentUser={effectiveUser} data={data}/>
      <div className="main">
        {tab==='home' && <Home data={data} currentUser={effectiveUser} role={role} setTab={setTab} markNotifRead={markNotifRead}/>}
        {tab==='dashboard' && <Dashboard data={data} setTab={setTab} role={role} currentUser={effectiveUser} update={update}/>}
        {tab==='today' && <TodaysShoot data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='schedule' && <Schedule data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='documents' && <Documents data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='announcements' && <Announcements data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='wall' && <MessageWall data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='departments' && <Departments data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='crew' && <CrewDirectory data={data} update={update} role={role} currentUser={effectiveUser}/>}
        {tab==='notifications' && <NotificationCenter data={data} currentUser={effectiveUser} role={role} update={update} markNotifRead={markNotifRead}/>}
        {tab==='cast' && <CastDashboard data={data} currentUser={effectiveUser} update={update} role={role}/>}
        {tab==='deptdash' && <DeptDashboard data={data} currentUser={effectiveUser} update={update} role={role}/>}
        {tab==='producer' && (role==='owner'||role==='producer') && <ProducerDashboard data={data} currentUser={effectiveUser} role={role}/>}
        {tab==='admin' && (
          role==='owner'
            ? <Admin data={data} update={update} setAuthed={setAuthed} currentUser={effectiveUser}/>
            : <AccessDenied/>
        )}
      </div>
    </div>
  );
}

/* ============ TODAY'S SHOOT ============ */
function TodaysShoot({data,update,role,currentUser}){
  const days = data.schedule.days || [];
  const canEditDays = can(currentUser,'edit_shoot_days');
  const [showAdd,setShowAdd] = useState(false);
  const [edit,setEdit] = useState(null);
  const [expandedId,setExpandedId] = useState(null);

  const blankDay = {
    day:'', date:'', status:'upcoming', crewCall:'', castCalls:'', location:'',
    parking:'', scenes:'', pageCount:'', wrap:'', deptNotes:'', safety:'', meal:'',
    attachments:[], callSheet:null, sides:null
  };
  const [form,setForm] = useState(blankDay);

  function addDay(){
    if(!form.day.toString().trim()) return;
    update(d=>{ d.schedule.days.push({...form,id:uid()}); });
    setForm(blankDay);
    setShowAdd(false);
  }
  function saveDay(updatedDay){
    if(!can(currentUser,'edit_shoot_days') && !can(currentUser,'add_dept_note_to_shoot_day',{department:currentUser.department})){
      return; // backend-style block
    }
    update(d=>{
      const idx = d.schedule.days.findIndex(x=>x.id===updatedDay.id);
      if(idx===-1) return;
      if(can(currentUser,'edit_shoot_days')){
        d.schedule.days[idx] = updatedDay;
      }else{
        // Department heads can only update their own dept note field
        d.schedule.days[idx].deptNotes = updatedDay.deptNotes;
      }
    });
    setEdit(null);
  }
  function deleteDay(id){
    if(!can(currentUser,'edit_shoot_days')) return;
    if(!confirm("Delete this shoot day?")) return;
    update(d=>{d.schedule.days = d.schedule.days.filter(x=>x.id!==id);});
  }

  const sortedDays = [...days].sort((a,b)=>(parseInt(a.day)||0)-(parseInt(b.day)||0));
  const activeDay = sortedDays.find(d=>d.status==='shooting') || sortedDays.find(d=>parseInt(d.day)===data.meta.currentDay) || sortedDays[0];

  return (
    <div>
      <div className="section-title">Today's Shoot</div>

      {activeDay ? (
        <ShootDayCard
          day={activeDay}
          highlight
          currentUser={currentUser}
          canEditDays={canEditDays}
          onEdit={()=>setEdit(activeDay)}
          onDelete={()=>deleteDay(activeDay.id)}
          expanded
        />
      ) : (
        <div className="empty-state">No shoot days have been entered yet.</div>
      )}

      {canEditDays && !showAdd && (
        <div className="btn-row"><button className="btn" onClick={()=>setShowAdd(true)}>+ Add Shoot Day</button></div>
      )}
      {canEditDays && showAdd && (
        <div className="card">
          <ShootDayEditForm form={form} setForm={setForm} onSave={addDay} onCancel={()=>{setForm(blankDay);setShowAdd(false);}} addMode currentUser={currentUser} fullEdit/>
        </div>
      )}

      <div className="section-title" style={{marginTop:'20px'}}>All Shoot Days</div>
      {sortedDays.length===0 && <div className="empty-state">No shoot days entered yet.</div>}
      {sortedDays.map(day=>{
        const isEditingThis = edit && edit.id===day.id;
        const canEditThis = canEditDays || can(currentUser,'add_dept_note_to_shoot_day',{department:currentUser.department});
        return (
          <div key={day.id}>
            {isEditingThis ? (
              <div className="card">
                <ShootDayEditForm
                  form={edit} setForm={setEdit}
                  onSave={()=>saveDay(edit)} onCancel={()=>setEdit(null)}
                  currentUser={currentUser}
                  fullEdit={canEditDays}
                />
              </div>
            ) : (
              <ShootDayCard
                day={day}
                currentUser={currentUser}
                canEditDays={canEditDays}
                canEditThis={canEditThis}
                onEdit={()=>setEdit(day)}
                onDelete={()=>deleteDay(day.id)}
                expanded={expandedId===day.id}
                onToggle={()=>setExpandedId(expandedId===day.id?null:day.id)}
              />
            )}
          </div>
        );
      })}
    </div>
  );
}

  );

    const reader = new FileReader();
    reader.onload = ()=>{
      setForm({...form,[field]:{fileData:reader.result,fileName:file.name}});

    reader.readAsDataURL(file);
  }
  function handleAttachment(e){
    const file = e.target.files[0];

    const reader = new FileReader();

/* ============ SCHEDULE (Uploaded File) ============ */
function Schedule({data,update,role,currentUser}){
  const sched = data.schedule;
  const canManage = can(currentUser,'upload_schedule');

  function handleFile(e){
    if(!canManage) return; // backend-style block
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      update(d=>{
        d.schedule.fileData = reader.result;
        d.schedule.fileName = file.name;
        d.schedule.fileType = file.type;
        d.schedule.uploadedLabel = new Date().toLocaleString();
        d.schedule.uploadedBy = `${currentUser.firstName} ${currentUser.lastName}`;
        d.schedule.version = (d.schedule.version||0)+1;
      });
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  function removeSchedule(){
    if(!can(currentUser,'delete_schedule')) return;
    if(!confirm("Remove the uploaded schedule? This cannot be undone.")) return;
    update(d=>{
      d.schedule.fileData = "";
      d.schedule.fileName = "";
      d.schedule.fileType = "";
      d.schedule.uploadedLabel = "";
      d.schedule.uploadedBy = "";
    });
  }

  return (
    <div>
      <div className="section-title">Full Shooting Schedule</div>

      {sched.fileName ? (
        <div className="card">
          <div className="card-row"><span className="label">Latest Schedule Uploaded</span><span className="value">{sched.uploadedLabel}</span></div>
          <div className="card-row"><span className="label">Uploaded By</span><span className="value">{sched.uploadedBy||'—'}</span></div>
          <div className="card-row"><span className="label">Version</span><span className="value">v{sched.version||1}</span></div>
          <div className="card-row"><span className="label">File</span><span className="value">{sched.fileName}</span></div>
          <div className="btn-row">
            <a className="btn-secondary btn-sm" href={sched.fileData} download={sched.fileName} style={{textDecoration:'none',display:'inline-block'}}>Download / View</a>
            {canManage && <button className="btn-danger btn-sm" onClick={removeSchedule}>Remove</button>}
          </div>
        </div>
      ) : (
        <div className="empty-state">No schedule has been uploaded yet.</div>
      )}

      {canManage && (
        <div className="card">
          <label className="form-label">Upload / Replace Schedule (PDF, Excel, CSV, Image)</label>
          <input type="file" className="form-input" accept=".pdf,.xls,.xlsx,.csv,image/*" onChange={handleFile}/>
        </div>
      )}

      <div className="section-title" style={{marginTop:'20px'}}>Day-by-Day Shoot Status</div>
      {(data.schedule.days||[]).length===0 && <div className="empty-state">No shoot days entered yet. See Today's Shoot to add them.</div>}
      {[...(data.schedule.days||[])].sort((a,b)=>(parseInt(a.day)||0)-(parseInt(b.day)||0)).map(day=>{
        const statusLabelMap = {upcoming:'Upcoming',shooting:'Today',completed:'Completed',changed:'Changed'};
        return (
          <div key={day.id} className="card-row">
            <span className="value">Shoot Day {String(day.day).padStart(2,'0')}{day.date?' — '+fmtDate(day.date):''}</span>
            <span className={"status-tag status-"+(day.status||'upcoming')}>{statusLabelMap[day.status]||day.status}</span>
          </div>
        );
      })}
    </div>
  );
}

/* ============ DOCUMENTS ============ */
const DOC_CATEGORIES = ["Call Sheets","Shooting Schedule","Cast List","Crew List","Location Info","Parking Maps","Safety Documents","Script Pages","Sides","NDAs / Releases","Production Memos","Vendor Info","Emergency Contacts"];

function Documents({data,update,role,currentUser}){
  const canUploadProduction = can(currentUser,'upload_production_document');
  const canUploadDept = can(currentUser,'upload_department_document',{department:currentUser.department});
  const canUpload = canUploadProduction || canUploadDept;
  const canDelete = can(currentUser,'delete_document');

  const [category,setCategory] = useState(DOC_CATEGORIES[0]);
  const [filter,setFilter] = useState("All");
  const [visType,setVisType] = useState(canUploadProduction ? 'everyone' : 'department');
  const [visDept,setVisDept] = useState(currentUser.department);

  function handleFile(e){
    if(!canUpload) return; // backend-style block
    const file = e.target.files[0];
    if(!file) return;

    let visibility = {type:'everyone',value:null};
    if(canUploadProduction){
      visibility = {type:visType, value: visType==='department' ? visDept : null};
    }else if(canUploadDept){
      // dept heads restricted to their own department visibility
      visibility = {type:'department', value: currentUser.department};
    }

    const reader = new FileReader();
    reader.onload = ()=>{
      update(d=>{
        d.documents.unshift({
          id:uid(),name:file.name,category,date:new Date().toLocaleDateString(),
          fileData:reader.result,fileType:file.type,
          visibility, uploadedBy:`${currentUser.firstName} ${currentUser.lastName}`
        });
      });
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  function deleteDoc(id){
    if(!canDelete) return; // backend-style block
    if(!confirm("Remove this document?")) return;
    update(d=>{d.documents = d.documents.filter(x=>x.id!==id);});
  }

  const visibleDocs = data.documents.filter(d=>can(currentUser,'view_document',{visibility:d.visibility}));
  const docs = filter==="All" ? visibleDocs : visibleDocs.filter(d=>d.category===filter);

  function visLabel(vis){
    if(!vis || vis.type==='everyone') return 'Everyone';
    if(vis.type==='producers') return 'Producers Only';
    if(vis.type==='cast') return 'Cast Only';
    if(vis.type==='owner') return 'Owner Only';
    if(vis.type==='department') return vis.value+' Only';
    return 'Everyone';
  }

  return (
    <div>
      <div className="section-title">Production Documents</div>

      {canUpload && (
        <div className="card">
          <label className="form-label">Category</label>
          <select className="form-select" value={category} onChange={e=>setCategory(e.target.value)}>
            {DOC_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>

          {canUploadProduction ? (
            <>
              <label className="form-label" style={{marginTop:'12px'}}>Visible To</label>
              <select className="form-select" value={visType} onChange={e=>setVisType(e.target.value)}>
                {DOC_VISIBILITY_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
              </select>
              {visType==='department' && (
                <select className="form-select" style={{marginTop:'8px'}} value={visDept} onChange={e=>setVisDept(e.target.value)}>
                  {Object.keys(DEPARTMENT_TREE).map(dep=><option key={dep} value={dep}>{dep}</option>)}
                </select>
              )}
            </>
          ) : (
            <div style={{fontSize:'12px',color:'var(--gray)',marginTop:'8px'}}>
              This will be visible to {currentUser.department} only.
            </div>
          )}

          <label className="form-label" style={{marginTop:'12px'}}>Upload File</label>
          <input type="file" className="form-input" onChange={handleFile}/>
        </div>
      )}

      <div className="form-group">
        <label className="form-label">Filter by Category</label>
        <select className="form-select" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>All</option>
          {DOC_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {docs.length===0 && <div className="empty-state">No documents in this category yet.</div>}

      {docs.map(doc=>(
        <div key={doc.id} className="list-item">
          <div className="list-item-head">
            <div>
              <div className="list-item-title">{doc.name}</div>
              <div className="list-item-sub">{doc.category} · Uploaded {doc.date}{doc.uploadedBy?' by '+doc.uploadedBy:''}</div>
              <div className="list-item-sub" style={{color:'var(--amber)'}}>Visible to: {visLabel(doc.visibility)}</div>
            </div>
          </div>
          <div className="btn-row">
            <a className="btn-secondary btn-sm" href={doc.fileData} download={doc.name} style={{textDecoration:'none'}}>Download / View</a>
            {canDelete && <button className="btn-danger btn-sm" onClick={()=>deleteDoc(doc.id)}>Delete</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ============ ANNOUNCEMENTS ============ */
function Announcements({data,update,role,currentUser}){
  const canPost = can(currentUser,'post_announcement');
  const canModerate = can(currentUser,'post_announcement'); // owner & producer can pin/delete
  const canDeleteAny = can(currentUser,'delete_any_message');
  const [text,setText] = useState("");

  function post(){
    if(!canPost) return; // backend-style block
    if(!text.trim()) return;
    update(d=>{
      d.announcements.unshift({id:uid(),text,author:`${currentUser.firstName} ${currentUser.lastName}`,authorId:currentUser.id,date:new Date().toLocaleString(),pinned:false});
    });
    setText("");
  }
  function togglePin(id){
    if(!canModerate) return; // backend-style block
    update(d=>{
      const a = d.announcements.find(x=>x.id===id);
      if(a) a.pinned = !a.pinned;
    });
  }
  function del(id){
    if(!(canModerate || canDeleteAny)) return; // backend-style block
    if(!confirm("Delete this announcement?")) return;
    update(d=>{d.announcements = d.announcements.filter(x=>x.id!==id);});
  }

  const sorted = [...data.announcements].sort((a,b)=>{
    if(a.pinned!==b.pinned) return a.pinned? -1:1;
    return 0;
  });

  return (
    <div>
      <div className="section-title">Announcements</div>

      {canPost && (
        <div className="card">
          <div className="form-group">
            <label className="form-label">New Announcement</label>
            <textarea className="form-textarea" placeholder="e.g. Call time moved to 8:00 AM." value={text} onChange={e=>setText(e.target.value)}/>
          </div>
          <button className="btn" onClick={post}>Post Announcement</button>
        </div>
      )}

      {sorted.length===0 && <div className="empty-state">No announcements yet.</div>}
      {sorted.map(a=>(
        <div key={a.id} className={"msg-card"+(a.pinned?' pinned':'')}>
          <div className="msg-head">
            <span className="msg-author">{a.pinned && '📌 '}{a.author}</span>
            <span className="msg-meta">{a.date}</span>
          </div>
          <div className="msg-body">{a.text}</div>
          {(canModerate || canDeleteAny) && (
            <div className="msg-actions">
              {canModerate && <button className="btn-secondary btn-sm" onClick={()=>togglePin(a.id)}>{a.pinned?'Unpin':'Pin'}</button>}
              <button className="btn-danger btn-sm" onClick={()=>del(a.id)}>Delete</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ============ MESSAGE WALL ============ */
function MessageWall({data,update,role,currentUser}){
  const [text,setText] = useState("");
  const [channel,setChannel] = useState("General");
  const [filter,setFilter] = useState("All");

  const channels = ["General","Announcements","Urgent Updates",...Object.keys(DEPARTMENT_TREE).map(d=>d+" — Department")];

  function post(){
    if(!text.trim()) return;
    update(d=>{
      d.messages.unshift({
        id:uid(),text,author:`${currentUser.firstName} ${currentUser.lastName}`,
        authorId:currentUser.id,dept:currentUser.department,channel,
        date:new Date().toLocaleString(),pinned:false
      });
    });
    setText("");
  }

  function togglePin(msg){
    const msgDept = (msg.channel||"").replace(" — Department","");
    const isDeptChannel = (msg.channel||"").includes(" — Department");
    const allowed = can(currentUser,'pin_production_message') ||
      (isDeptChannel && can(currentUser,'pin_department_message') && currentUser.department===msgDept);
    if(!allowed) return; // backend-style block
    update(d=>{
      const m = d.messages.find(x=>x.id===msg.id);
      if(m) m.pinned = !m.pinned;
    });
  }

  function del(msg){
    const isOwnPost = msg.authorId === currentUser.id;
    const allowed = can(currentUser,'delete_any_message') || (can(currentUser,'delete_own_message') && isOwnPost);
    if(!allowed) return; // backend-style block
    if(!confirm("Delete this message?")) return;
    update(d=>{d.messages = d.messages.filter(x=>x.id!==msg.id);});
  }

  let msgs = [...data.messages];
  if(filter!=="All") msgs = msgs.filter(m=>m.channel===filter);
  msgs.sort((a,b)=>{ if(a.pinned!==b.pinned) return a.pinned?-1:1; return 0; });

  return (
    <div>
      <div className="section-title">Message Wall</div>

      <div className="card">
        <div className="form-group">
          <label className="form-label">Channel</label>
          <select className="form-select" value={channel} onChange={e=>setChannel(e.target.value)}>
            {channels.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Message</label>
          <textarea className="form-textarea" value={text} onChange={e=>setText(e.target.value)} placeholder="Post to the production wall..."/>
        </div>
        <button className="btn" onClick={post}>Post Message</button>
      </div>

      <div className="form-group">
        <label className="form-label">Filter by Channel</label>
        <select className="form-select" value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>All</option>
          {channels.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>

      {msgs.length===0 && <div className="empty-state">No messages yet. Be the first to post.</div>}
      {msgs.map(m=>{
        const msgDept = (m.channel||"").replace(" — Department","");
        const isDeptChannel = (m.channel||"").includes(" — Department");
        const canPin = can(currentUser,'pin_production_message') ||
          (isDeptChannel && can(currentUser,'pin_department_message') && currentUser.department===msgDept);
        const canDel = can(currentUser,'delete_any_message') || (m.authorId===currentUser.id);
        return (
          <div key={m.id} className={"msg-card"+(m.pinned?' pinned':'')}>
            <div className="msg-head">
              <span className="msg-author">{m.pinned && '📌 '}{m.author}</span>
              <span className="msg-meta">{m.date}</span>
            </div>
            <div className="msg-tags"><span className="pill">{m.channel||'General'}</span></div>
            <div className="msg-body" style={{marginTop:'8px'}}>{m.text}</div>
            {(canPin || canDel) && (
              <div className="msg-actions">
                {canPin && <button className="btn-secondary btn-sm" onClick={()=>togglePin(m)}>{m.pinned?'Unpin':'Pin'}</button>}
                {canDel && <button className="btn-danger btn-sm" onClick={()=>del(m)}>Delete</button>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}
